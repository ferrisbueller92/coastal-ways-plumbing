<!doctype html>
<html lang="en-AU">
<head>
<meta charset="utf-8">
<title>Coastal Ways Plumbing — Vehicle Magnet — Concept A (Navy Authority) — Landscape</title>
<link rel="stylesheet" href="magnet.css">
<style>
  /* Concept A — NAVY AUTHORITY
     Bet: established, licensed, premium. Maximum contrast so it reads
     hardest on the white/silver utes that dominate the trade.
     Structure: full-bleed navy field + one full-bleed teal footer band.
     Services occupy the mid-band so the phone can stay full-width.
     No floating cards, no shadows, no gradients. */
  .mag{background:var(--navy)}
  .safe{bottom:calc(20*var(--u));justify-content:space-between}
  .top{display:flex;align-items:flex-start;justify-content:space-between}
  .svc-row{white-space:nowrap}
  .svc-row .svc{white-space:nowrap}
  .hero .eyebrow{margin-bottom:calc(2.4*var(--u))}
  .accent{width:calc(24*var(--u));margin-bottom:calc(3.2*var(--u))}

  .footer-band{height:calc(15*var(--u));background:var(--teal);
    padding:0 calc(7*var(--u));justify-content:space-between}
  .footer-band .web{color:var(--sand)}
  .footer-band .tagline{font-family:"Space Grotesk";font-weight:500;
    font-size:calc(2.9*var(--u));letter-spacing:.2em;text-transform:uppercase;
    color:var(--teal-tint);line-height:1}
</style>
</head>
<body>

<div class="mag land on-dark">

  <div class="safe">
    <div class="top">
      <img class="logo logo-h" src="assets/logo-horizontal-white.png"
           alt="Coastal Ways Plumbing">
      <span class="lic">NSW Lic. 468634C</span>
    </div>

    <div class="svc-row">
      <span class="dot"></span><span class="svc">Blocked drains</span>
      <span class="dot"></span><span class="svc">Hot water</span>
      <span class="dot"></span><span class="svc">Gas fitting</span>
      <span class="dot"></span><span class="svc">Leak detection</span>
    </div>

    <div class="hero">
      <hr class="rule accent">
      <div class="eyebrow">Call Beau &middot; 24/7 Emergency</div>
      <div class="phone">0402&nbsp;269&nbsp;088</div>
    </div>
  </div>

  <div class="band bottom footer-band">
    <div class="web">coastalwaysplumbing.com</div>
    <div class="tagline">Central Coast</div>
  </div>

</div>

</body>
</html>
