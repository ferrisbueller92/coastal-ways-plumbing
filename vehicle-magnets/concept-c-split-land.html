<!doctype html>
<html lang="en-AU">
<head>
<meta charset="utf-8">
<title>Coastal Ways Plumbing — Vehicle Magnet — Concept C (Deep Teal Split) — Landscape</title>
<link rel="stylesheet" href="magnet.css">
<style>
  /* Concept C — DEEP TEAL SPLIT
     ("split", NOT hi-vis — no safety-yellow anywhere in this design.)
     Bet: roadside differentiation + emergency-forward. Nearly every
     plumber's vehicle in the Central Coast is white-and-blue; a deep
     teal field owns a colour nobody else on the road is using.
     Structure: hard two-tone split with a WAVE boundary taken from the
     logomark — the one device here that can't be mistaken for a
     template. Phone sits in the navy block for max internal contrast. */
  .mag.land{display:flex;flex-direction:column;background:var(--teal)}

  .zone-top{flex:0 0 50%;padding:calc(7*var(--u)) calc(7*var(--u)) 0;
    display:flex;flex-direction:column;justify-content:space-between;
    position:relative;z-index:2}
  .zone-bot{flex:1;background:var(--navy);padding:calc(1*var(--u)) calc(7*var(--u)) calc(5.5*var(--u));
    display:flex;flex-direction:column;justify-content:flex-end;position:relative;z-index:1}

  .top{display:flex;align-items:flex-start;justify-content:space-between}
  .zone-top .lic{color:var(--sand);opacity:.72}
  .zone-top .svc{color:var(--sand)}
  .zone-top .dot{background:var(--sand);opacity:.55}
  /* must clear the wave crest, which rises 7u into the teal zone */
  .svc-row{margin-bottom:calc(10*var(--u))}
  .svc-row .svc{white-space:nowrap}

  /* wave boundary — navy floods upward into the teal field */
  .split{position:absolute;left:0;right:0;bottom:50%;width:100%;
    height:calc(7*var(--u));display:block;z-index:1}

  .zone-bot .eyebrow{color:var(--teal-tint);margin-bottom:calc(2*var(--u))}
  .zone-bot .phone{color:var(--sand)}
  .foot{display:flex;align-items:baseline;justify-content:space-between;
    margin-top:calc(2.6*var(--u))}
  .foot .web{color:var(--sand)}
  .foot .tagline{font-family:"Space Grotesk";font-weight:500;
    font-size:calc(2.9*var(--u));letter-spacing:.2em;text-transform:uppercase;
    color:var(--teal-tint);line-height:1}
</style>
</head>
<body>

<div class="mag land on-dark">

  <div class="zone-top">
    <div class="top">
      <img class="logo logo-h" src="assets/logo-horizontal-white.png"
           alt="Coastal Ways Plumbing">
      <span class="lic">NSW Lic. 468634C</span>
    </div>
    <div class="svc-row">
      <span class="dot"></span><span class="svc">Blocked drains</span>
      <span class="dot"></span><span class="svc">Hot water</span>
      <span class="dot"></span><span class="svc">Gas fitting</span>
      <span class="dot"></span><span class="svc">Leak detection</span>
    </div>
  </div>

  <svg class="split" viewBox="0 0 1818 120" preserveAspectRatio="none" aria-hidden="true">
    <path d="M0,120 L0,66 C 210,14 420,104 620,58 S 1020,6 1230,58 S 1620,106 1818,52 L1818,120 Z"
          fill="#10202D"/>
  </svg>

  <div class="zone-bot">
    <div class="eyebrow">Call Beau &middot; 24/7 Emergency</div>
    <div class="phone">0402&nbsp;269&nbsp;088</div>
    <div class="foot">
      <div class="web">coastalwaysplumbing.com</div>
      <div class="tagline">Central Coast</div>
    </div>
  </div>

</div>

</body>
</html>
