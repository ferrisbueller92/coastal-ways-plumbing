<!doctype html>
<html lang="en-AU">
<head>
<meta charset="utf-8">
<title>Coastal Ways Plumbing — Vehicle Magnet — Concept A (Navy Authority) — Portrait</title>
<link rel="stylesheet" href="magnet.css">
<style>
  /* Concept A — NAVY AUTHORITY — portrait 400×600mm
     Same strategic bet as the landscape, recomposed for a tall panel:
     stacked lockup, 2×2 service grid, phone broken after the prefix. */
  .mag{background:var(--navy)}
  .safe{bottom:calc(20*var(--u));justify-content:space-between}
  .top{display:flex;align-items:flex-start;justify-content:space-between}
  .hero .eyebrow{margin-bottom:calc(2.4*var(--u))}
  .accent{width:calc(24*var(--u));margin-bottom:calc(3.2*var(--u))}

  .footer-band{height:calc(15*var(--u));background:var(--teal);
    padding:0 calc(7*var(--u));flex-direction:column;align-items:flex-start;
    justify-content:center;gap:calc(1.6*var(--u))}
  .footer-band .web{color:var(--sand)}
  .footer-band .tagline{font-family:"Space Grotesk";font-weight:500;
    font-size:calc(2.9*var(--u));letter-spacing:.2em;text-transform:uppercase;
    color:var(--teal-tint);line-height:1}
</style>
</head>
<body>

<div class="mag port on-dark">

  <div class="safe">
    <div class="top">
      <img class="logo logo-s" src="assets/logo-full-white.png"
           alt="Coastal Ways Plumbing">
      <span class="lic">NSW Lic.<br>468634C</span>
    </div>

    <div class="svc-grid">
      <div class="svc-item"><span class="dot"></span><span class="svc">Blocked drains</span></div>
      <div class="svc-item"><span class="dot"></span><span class="svc">Hot water</span></div>
      <div class="svc-item"><span class="dot"></span><span class="svc">Gas fitting</span></div>
      <div class="svc-item"><span class="dot"></span><span class="svc">Leak detection</span></div>
    </div>

    <div class="hero">
      <hr class="rule accent">
      <div class="eyebrow">Call Beau &middot; 24/7 Emergency</div>
      <div class="phone"><span class="ln">0402</span><span class="ln">269&nbsp;088</span></div>
    </div>
  </div>

  <div class="band bottom footer-band">
    <div class="web">coastalwaysplumbing.com</div>
    <div class="tagline">Central Coast</div>
  </div>

</div>

</body>
</html>
