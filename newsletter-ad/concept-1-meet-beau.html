<!DOCTYPE html>
<html lang="en-AU"><head><meta charset="utf-8">
<title>CWP Newsletter Ad — Concept 1 · Meet Beau</title>
<link rel="stylesheet" href="brand.css">
<style>
  body{background:#cdd3d6;display:flex;align-items:center;justify-content:center;min-height:100vh}
  .c1 .photo{position:absolute;left:0;top:0;bottom:0;width:39%;overflow:hidden}
  .c1 .photo img{width:100%;height:100%;object-fit:cover;object-position:50% 16%}
  .c1 .photo::after{content:"";position:absolute;inset:0;
    background:linear-gradient(180deg,rgba(16,32,45,0) 50%,rgba(16,32,45,.86) 100%)}
  .c1 .nameplate{position:absolute;left:6cqw;bottom:5cqw;z-index:2;color:var(--sand)}
  .c1 .nameplate .n{font-family:"Space Grotesk";font-weight:700;font-size:3cqw;line-height:1}
  .c1 .nameplate .r{font-family:"Roboto";font-weight:400;font-size:1.95cqw;
    color:rgba(251,246,243,.82);margin-top:.6cqw}
  .c1 .body{position:absolute;left:39%;top:0;right:0;bottom:0;
    padding:6cqw 6.5cqw 5.2cqw 5.2cqw;display:flex;flex-direction:column}
  .c1 .logo{width:31cqw;height:auto;display:block}
  .c1 h1{font-size:5cqw;margin-top:2.8cqw}
  .c1 h1 em{font-style:normal;color:var(--teal)}
  .c1 .rule{margin:2.4cqw 0 2.2cqw;width:14cqw}
  .c1 .phone{font-size:5.4cqw}
  .c1 .foot{margin-top:auto;display:flex;align-items:flex-end;justify-content:space-between;gap:3cqw}
  .c1 .foot .lines{display:flex;flex-direction:column;gap:.7cqw}
  .c1 .qrwrap{text-align:center}
</style></head>
<body>
<div class="card c1">
  <div class="photo"><img src="assets/beau.jpg" alt="Beau Petterson">
    <div class="nameplate"><div class="n">Beau Petterson</div>
      <div class="r">Licensed plumber · 10+ years on the Coast</div></div>
  </div>
  <div class="body">
    <img class="logo" src="assets/logo-horizontal-trans.png" alt="Coastal Ways Plumbing">
    <h1>Your local <em>Central&nbsp;Coast</em> plumber.</h1>
    <hr class="rule">
    <div class="phone"><span class="pre">Call Beau direct</span>0402&nbsp;269&nbsp;088</div>
    <div class="foot">
      <div class="lines">
        <div class="web">coastalwaysplumbing.com</div>
        <div class="lic">NSW Lic. 468634C</div>
      </div>
      <div class="qrwrap">
        <span class="qr"><img src="assets/qr.png" alt="Scan"></span>
        <div class="qr-cap">Scan us</div>
      </div>
    </div>
  </div>
</div>
<script src="fit.js"></script>
</body></html>
