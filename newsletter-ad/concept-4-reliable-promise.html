<!DOCTYPE html>
<html lang="en-AU"><head><meta charset="utf-8">
<title>CWP Newsletter Ad — Concept 4 · The Reliable Promise</title>
<link rel="stylesheet" href="brand.css">
<style>
  body{background:#cdd3d6;display:flex;align-items:center;justify-content:center;min-height:100vh}
  .c4 .safe{flex-direction:column}
  .c4 .top{display:flex;align-items:center;justify-content:space-between}
  .c4 .logo{width:32cqw;height:auto;display:block}
  .c4 .quote{margin:auto 0;display:flex}
  .c4 h1{font-size:8.4cqw;line-height:.99;max-width:88cqw}
  .c4 h1 em{font-style:normal;color:var(--teal);position:relative;white-space:nowrap}
  .c4 h1 em::after{content:"";position:absolute;left:0;right:0;bottom:-.04em;height:.06em;
    background:var(--teal);border-radius:2px}
  .c4 .foot{display:flex;align-items:flex-end;justify-content:space-between;gap:3cqw}
  .c4 .phone{font-size:6cqw}
  .c4 .lines{display:flex;flex-direction:column;gap:1cqw;margin-top:1.2cqw}
  .c4 .qrwrap{text-align:center}
</style></head>
<body>
<div class="card c4">
  <div class="safe">
    <div class="top">
      <img class="logo" src="assets/logo-horizontal-trans.png" alt="Coastal Ways Plumbing">
      <span class="eyebrow">Central&nbsp;Coast&nbsp;NSW</span>
    </div>
    <div class="quote"><h1>We <em>turn&nbsp;up</em> when we say we will.</h1></div>
    <div class="foot">
      <div>
        <div class="phone"><span class="pre">Your local plumber — call</span>0402&nbsp;269&nbsp;088</div>
        <div class="lines">
          <div class="web">coastalwaysplumbing.com</div>
          <div class="lic">NSW Lic. 468634C</div>
        </div>
      </div>
      <div class="qrwrap"><span class="qr"><img src="assets/qr.png" alt="Scan"></span>
        <div class="qr-cap">Scan us</div></div>
    </div>
  </div>
</div>
</body></html>
