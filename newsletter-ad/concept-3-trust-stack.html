<!DOCTYPE html>
<html lang="en-AU"><head><meta charset="utf-8">
<title>CWP Newsletter Ad — Concept 3 · Trust Stack</title>
<link rel="stylesheet" href="brand.css">
<style>
  body{background:#cdd3d6;display:flex;align-items:center;justify-content:center;min-height:100vh}
  .c3{background:var(--navy)}
  .c3::before{content:"";position:absolute;inset:0;
    background:radial-gradient(120% 90% at 88% 6%,rgba(5,90,95,.42),rgba(5,90,95,0) 55%)}
  .c3 .safe{flex-direction:column}
  .c3 .top{display:flex;align-items:center;justify-content:space-between}
  .c3 .logo{width:34cqw;height:auto;display:block}
  .c3 h1{font-size:5.3cqw;margin-top:3cqw;max-width:80cqw}
  .c3 h1 em{font-style:normal;color:var(--teal-tint)}
  .c3 .ticks{display:grid;grid-template-columns:1fr 1fr;gap:1.7cqw 3.6cqw;margin-top:3cqw}
  .c3 .tick{font-size:2.6cqw}
  .c3 .foot{margin-top:auto;display:flex;align-items:flex-end;justify-content:space-between;gap:3cqw}
  .c3 .phone{font-size:6cqw;color:#fff}
  .c3 .lines{display:flex;flex-direction:column;gap:1cqw;margin-top:1.2cqw}
  .c3 .qrwrap{text-align:center}
</style></head>
<body>
<div class="card c3 on-dark">
  <div class="safe">
    <div class="top">
      <img class="logo" src="assets/logo-horizontal-white.png" alt="Coastal Ways Plumbing">
      <span class="eyebrow">Central&nbsp;Coast&nbsp;NSW</span>
    </div>
    <h1>The plumber the Coast <em>relies on.</em></h1>
    <div class="ticks">
      <div class="tick"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="12" fill="#E6F0F1"/><path d="M6.5 12.4l3.2 3.2 7.8-7.8" fill="none" stroke="#10202D" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/></svg>Licensed · 468634C</div>
      <div class="tick"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="12" fill="#E6F0F1"/><path d="M6.5 12.4l3.2 3.2 7.8-7.8" fill="none" stroke="#10202D" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/></svg>Fully insured</div>
      <div class="tick"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="12" fill="#E6F0F1"/><path d="M6.5 12.4l3.2 3.2 7.8-7.8" fill="none" stroke="#10202D" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/></svg>On time, every time</div>
      <div class="tick"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="12" fill="#E6F0F1"/><path d="M6.5 12.4l3.2 3.2 7.8-7.8" fill="none" stroke="#10202D" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/></svg>Fair, upfront pricing</div>
    </div>
    <div class="foot">
      <div>
        <div class="phone"><span class="pre">Call us today</span>0402&nbsp;269&nbsp;088</div>
        <div class="lines"><div class="web">coastalwaysplumbing.com</div></div>
      </div>
      <div class="qrwrap"><span class="qr"><img src="assets/qr.png" alt="Scan"></span>
        <div class="qr-cap">Scan us</div></div>
    </div>
  </div>
</div>
</body></html>
