<!DOCTYPE html>
<html lang="en-AU"><head><meta charset="utf-8">
<title>CWP Newsletter Ad — Concept 2 · We're Local</title>
<link rel="stylesheet" href="brand.css">
<style>
  body{background:#cdd3d6;display:flex;align-items:center;justify-content:center;min-height:100vh}
  .c2 .waves{z-index:0;height:88px}
  .c2 .safe{flex-direction:column;z-index:1}
  .c2 .top{display:flex;align-items:center;justify-content:space-between}
  .c2 .logo{width:30cqw;height:auto;display:block}
  .c2 h1{font-size:5.8cqw;margin-top:2.4cqw}
  .c2 h1 em{font-style:normal;color:var(--teal)}
  .c2 .sub{font-family:"Roboto";font-weight:300;font-size:2.35cqw;color:var(--navy-80);
    margin-top:1.2cqw;line-height:1.2}
  .c2 .chips{display:flex;gap:1.3cqw;margin-top:2.6cqw}
  .c2 .chips.r2{margin-top:1.3cqw}
  .c2 .pill{font-family:"Space Grotesk";font-weight:500;font-size:2.05cqw;
    background:var(--teal-tint);color:var(--teal);padding:.7cqw 1.7cqw;border-radius:10cqw;
    letter-spacing:.01em;white-space:nowrap}
  .c2 .foot{margin-top:auto;display:flex;align-items:flex-end;justify-content:space-between;gap:3cqw}
  .c2 .phone{font-size:4.9cqw}
  .c2 .lines{display:flex;flex-direction:column;gap:.8cqw;margin-top:1.3cqw}
  .c2 .waves{height:70px}
  .c2 .qrwrap{text-align:center}
</style></head>
<body>
<div class="card c2">
  <svg class="waves" viewBox="0 0 1134 110" preserveAspectRatio="none" aria-hidden="true">
    <path d="M0,52 C190,12 330,86 567,52 C800,18 940,88 1134,48 L1134,110 L0,110 Z" fill="#E6F0F1"/>
    <path d="M0,78 C210,44 360,104 600,74 C840,46 980,104 1134,74 L1134,110 L0,110 Z" fill="#055A5F" opacity="0.09"/>
  </svg>
  <div class="safe">
    <div class="top">
      <img class="logo" src="assets/logo-horizontal-trans.png" alt="Coastal Ways Plumbing">
      <span class="eyebrow">Central&nbsp;Coast&nbsp;NSW</span>
    </div>
    <h1>Plumbing, done the <em>Coastal&nbsp;way.</em></h1>
    <div class="sub">Based in Jilliby — looking after the whole Coast.</div>
    <div class="chips">
      <span class="pill">Blocked&nbsp;drains</span><span class="pill">Hot&nbsp;water</span><span class="pill">Gas&nbsp;fitting</span>
    </div>
    <div class="chips r2">
      <span class="pill">Leak&nbsp;detection</span><span class="pill">Renovations</span><span class="pill" style="background:var(--teal);color:var(--sand)">Emergencies</span>
    </div>
    <div class="foot">
      <div>
        <div class="phone"><span class="pre">Local &amp; licensed — call</span>0402&nbsp;269&nbsp;088</div>
        <div class="lines">
          <div class="web">coastalwaysplumbing.com&nbsp;&nbsp;<span class="lic">·&nbsp;&nbsp;NSW&nbsp;Lic.&nbsp;468634C</span></div>
        </div>
      </div>
      <div class="qrwrap"><span class="qr"><img src="assets/qr.png" alt="Scan"></span>
        <div class="qr-cap">Scan us</div></div>
    </div>
  </div>
</div>
<script src="fit.js"></script>
</body></html>
